# .github/workflows/deploy.yml  (in the buffy-blog repo)
# Deploys output/ (the LIVE, dripped site) to GitHub Pages on every push.
name: Deploy Buffy blog to Pages
on:
  push:
    branches: [main]
    paths: ["output/**"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: output
      - id: deployment
        uses: actions/deploy-pages@v4
